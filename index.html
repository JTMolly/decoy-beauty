<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:      #8B5060;
  --rose-mid:  #A86878;
  --rose-lt:   #C8959F;
  --rose-pale: #E8D0D4;
  --serif:     "Cormorant Garamond",serif;
  --cjk:       "Noto Serif TC",serif;
  --mono:      "IBM Plex Mono",monospace;
}
html,body{height:100%;margin:0;overflow:hidden}

/* ══ BASE BACKGROUND ══ */
body{
  background: #B07880;
}

/* ══ LAYER 1 — 底層漸層，慢速大範圍漂移 ══ */
.bg-layer1{
  position:fixed;inset:-30%;
  width:160%;height:160%;
  z-index:0;
  background:
    radial-gradient(ellipse 55% 55% at 30% 25%, #EDD8DA 0%, transparent 55%),
    radial-gradient(ellipse 45% 50% at 75% 70%, #C4878E 0%, transparent 50%),
    radial-gradient(ellipse 40% 45% at 85% 20%, #A86070 0%, transparent 45%),
    radial-gradient(ellipse 60% 40% at 20% 85%, #3D1824 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 60% 50%, #8B5060 0%, transparent 60%);
  animation: drift1 18s ease-in-out infinite alternate;
  will-change: transform;
}
@keyframes drift1{
  0%   { transform: translate(0%,    0%)   scale(1);    }
  25%  { transform: translate(3%,   -4%)   scale(1.04); }
  50%  { transform: translate(-4%,   3%)   scale(1.02); }
  75%  { transform: translate(5%,    2%)   scale(1.05); }
  100% { transform: translate(-2%,  -5%)   scale(1.03); }
}

/* ══ LAYER 2 — 光暈層，反向漂移製造對流 ══ */
.bg-layer2{
  position:fixed;inset:-20%;
  width:140%;height:140%;
  z-index:1;
  background:
    radial-gradient(ellipse 35% 40% at 70% 30%, rgba(237,216,220,0.55) 0%, transparent 50%),
    radial-gradient(ellipse 30% 35% at 20% 60%, rgba(196,135,142,0.4)  0%, transparent 45%),
    radial-gradient(ellipse 40% 30% at 50% 80%, rgba(61,24,36,0.5)     0%, transparent 50%),
    radial-gradient(ellipse 25% 40% at 90% 65%, rgba(139,80,96,0.45)   0%, transparent 45%);
  animation: drift2 13s ease-in-out infinite alternate;
  mix-blend-mode: multiply;
  will-change: transform;
}
@keyframes drift2{
  0%   { transform: translate(0%,   0%)  scale(1);    }
  30%  { transform: translate(-5%,  4%)  scale(1.06); }
  60%  { transform: translate(4%,  -3%)  scale(1.03); }
  100% { transform: translate(-3%,  5%)  scale(1.07); }
}

/* ══ LAYER 3 — 光澤亮點，快速小範圍移動 ══ */
.bg-layer3{
  position:fixed;inset:0;z-index:2;
  background:
    radial-gradient(ellipse 25% 30% at 60% 35%, rgba(255,240,242,0.3) 0%, transparent 60%),
    radial-gradient(ellipse 20% 25% at 30% 20%, rgba(255,245,245,0.2) 0%, transparent 55%);
  animation: shimmer 8s ease-in-out infinite alternate;
  will-change: transform, opacity;
}
@keyframes shimmer{
  0%   { transform: translate(0%,   0%);   opacity:0.6; }
  25%  { transform: translate(8%,  -5%);   opacity:1;   }
  50%  { transform: translate(-6%,  8%);   opacity:0.7; }
  75%  { transform: translate(10%, -3%);   opacity:0.9; }
  100% { transform: translate(-4%,  6%);   opacity:0.65;}
}

/* ══ LAYER 4 — 底部深色暈染，緩慢呼吸 ══ */
.bg-vignette{
  position:fixed;bottom:0;left:0;right:0;z-index:3;
  height:55%;
  background:linear-gradient(
    to bottom,
    transparent 0%,
    rgba(30,8,15,0.05) 20%,
    rgba(30,8,15,0.22) 50%,
    rgba(30,8,15,0.52) 78%,
    rgba(30,8,15,0.70) 100%
  );
  animation: breathe 10s ease-in-out infinite;
  pointer-events:none;
}
@keyframes breathe{
  0%,100% { opacity:0.85; }
  50%     { opacity:1;    }
}

/* ══ LEAF SVG — 輕微搖曳 ══ */
.leaves{
  position:fixed;inset:0;z-index:4;pointer-events:none;overflow:hidden;
}
.leaves svg{
  position:absolute;top:-5%;right:-8%;
  width:62%;height:auto;opacity:0.25;
  transform-origin:80% 10%;
  animation: sway 12s ease-in-out infinite;
}
@keyframes sway{
  0%,100% { transform: rotate(0deg)   translateX(0px)  translateY(0px);  }
  20%     { transform: rotate(0.8deg) translateX(6px)  translateY(-4px); }
  40%     { transform: rotate(-0.5deg)translateX(-4px) translateY(6px);  }
  60%     { transform: rotate(1deg)   translateX(8px)  translateY(-2px); }
  80%     { transform: rotate(-0.7deg)translateX(-6px) translateY(4px);  }
}

/* ══ CENTER ICON — 緩慢旋轉浮動 ══ */
.bg-icon{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-54%);
  z-index:5;
  width:min(640px,85vw);height:auto;
  opacity:0.11;
  pointer-events:none;
  filter:brightness(0) invert(1);
  animation: iconFloat 20s ease-in-out infinite;
  will-change: transform, opacity;
}
@keyframes iconFloat{
  0%   { transform:translate(-50%,-54%) scale(1)    rotate(0deg);   opacity:0.11; }
  25%  { transform:translate(-50%,-56%) scale(1.04) rotate(1.5deg); opacity:0.14; }
  50%  { transform:translate(-50%,-52%) scale(0.97) rotate(-1deg);  opacity:0.10; }
  75%  { transform:translate(-50%,-55%) scale(1.03) rotate(2deg);   opacity:0.13; }
  100% { transform:translate(-50%,-54%) scale(1)    rotate(0deg);   opacity:0.11; }
}

/* ══ NAV ══ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:30px 64px;
}
.nav-logo img{
  height:36px;width:auto;display:block;
  opacity:0.88;transition:opacity 0.3s;
}
.nav-logo:hover img{opacity:1}
.nav-right{display:flex;align-items:center;gap:48px}
.nav-links{display:flex;gap:40px;list-style:none}
.nav-links a{
  font-family:var(--mono);font-size:10px;letter-spacing:0.22em;
  text-transform:uppercase;color:rgba(255,255,255,0.62);
  text-decoration:none;transition:color 0.3s;
}
.nav-links a:hover{color:#fff}
.nav-reserve{
  font-family:var(--mono);font-size:10px;letter-spacing:0.18em;
  text-transform:uppercase;color:#fff;
  border:1px solid rgba(255,255,255,0.38);
  padding:10px 24px;text-decoration:none;transition:all 0.3s;
}
.nav-reserve:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.75)}

/* ══ CENTER SLOGAN ══ */
.center{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-58%);
  z-index:10;text-align:center;
  animation: fadeUp 1.8s cubic-bezier(0.16,1,0.3,1) both;
}
.c-brand-name{
  font-family:var(--mono);font-size:12px;letter-spacing:0.55em;
  text-transform:uppercase;color:rgba(255,255,255,0.5);
  margin-bottom:20px;display:block;padding-left:0.55em;
}
.c-en{
  font-family:var(--serif);
  font-size:clamp(52px,7.5vw,104px);
  font-weight:300;font-style:italic;
  color:#fff;letter-spacing:0.015em;line-height:1.0;
  margin-bottom:18px;
  text-shadow:0 4px 48px rgba(30,8,14,0.3);
}
.c-divider{
  width:36px;height:1px;background:rgba(255,255,255,0.28);
  margin:0 auto 18px;
}
.c-zh{
  font-family:var(--cjk);font-size:15px;font-weight:300;
  color:rgba(255,255,255,0.55);letter-spacing:0.3em;
}
@keyframes fadeUp{
  from{opacity:0;transform:translate(-50%,-52%) translateY(14px)}
  to{opacity:1;transform:translate(-50%,-58%) translateY(0)}
}

/* ══ BOTTOM NAV ══ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  display:grid;grid-template-columns:repeat(6,1fr);
  animation: slideUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.5s both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.bn{
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:7px;padding:22px 10px 24px;
  text-decoration:none;
  background:rgba(28,8,14,0.25);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.09);
  border-right:1px solid rgba(255,255,255,0.06);
  transition:background 0.4s;
}
.bn:last-child{border-right:none}
.bn::after{
  content:"";
  position:absolute;bottom:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--rose-lt),transparent);
  transform:scaleX(0);transform-origin:center;
  transition:transform 0.45s cubic-bezier(0.16,1,0.3,1);
}
.bn:hover{background:rgba(139,80,96,0.32)}
.bn:hover::after{transform:scaleX(1)}
.bn:hover .bn-num{color:var(--rose-pale)}
.bn:hover .bn-label{color:#fff}
.bn-num{
  font-family:var(--mono);font-size:8px;letter-spacing:0.22em;
  color:rgba(255,255,255,0.25);transition:color 0.3s;
}
.bn-label{
  font-family:var(--cjk);font-size:13px;font-weight:300;
  color:rgba(255,255,255,0.7);letter-spacing:0.07em;
  text-align:center;line-height:1.35;transition:color 0.3s;
}
.bn-en{
  font-family:var(--mono);font-size:8px;letter-spacing:0.16em;
  text-transform:uppercase;color:rgba(255,255,255,0.25);
}

/* ══ RWD ══ */
/* ── 平板 960px ── */
@media(max-width:960px){
  nav{padding:18px 28px}
  .nav-logo img{height:30px}
  .nav-links{display:none}
  .nav-reserve{font-size:9px;padding:9px 18px;letter-spacing:0.14em}

  /* slogan 稍微縮小 */
  .c-en{font-size:clamp(44px,8vw,72px)}
  .c-zh{font-size:14px;letter-spacing:0.24em}
  .c-brand-name{font-size:11px;letter-spacing:0.48em}

  /* 中心垂直置中改為固定偏上，避免被 bottom-nav 擋住 */
  .center{
    top:44%;
    transform:translate(-50%,-50%);
  }
  .bg-icon{
    top:44%;
    transform:translate(-50%,-50%);
  }

  /* bottom-nav 三欄，共兩排 */
  .bottom-nav{grid-template-columns:repeat(3,1fr)}
  .bn:nth-child(4),
  .bn:nth-child(5),
  .bn:nth-child(6){border-top:1px solid rgba(255,255,255,0.07)}

  .bg-icon{width:min(420px,80vw)}

  /* 葉影縮小，避免壓版 */
  .leaves svg{width:50%;right:-4%}
}

/* ── 手機 600px ── */
@media(max-width:600px){
  nav{padding:14px 18px}
  .nav-logo img{height:26px}
  .nav-reserve{font-size:9px;padding:7px 13px;letter-spacing:0.1em}

  .c-brand-name{font-size:9px;letter-spacing:0.4em;margin-bottom:14px}
  .c-en{font-size:clamp(32px,10.5vw,52px);margin-bottom:14px}
  .c-zh{font-size:12px;letter-spacing:0.18em}
  .c-divider{margin:0 auto 14px}

  /* 中心往上移，底部留更多空間給 bottom-nav */
  .center{
    top:40%;
    transform:translate(-50%,-50%);
  }
  .bg-icon{
    top:40%;
    transform:translate(-50%,-50%);
  }

  /* bottom-nav 兩欄三排 */
  .bottom-nav{grid-template-columns:repeat(2,1fr)}
  .bn{padding:16px 8px 18px;gap:5px}
  .bn-label{font-size:12px}
  .bn:nth-child(3),
  .bn:nth-child(4),
  .bn:nth-child(5),
  .bn:nth-child(6){border-top:1px solid rgba(255,255,255,0.07)}
  /* 讓第 5、6 格各佔一格，不合併 */
  .bn:nth-child(5){grid-column:1/2}
  .bn:nth-child(6){grid-column:2/3}
  .bn-en{display:none}

  .bg-icon{width:min(260px,78vw);opacity:0.08}
  .leaves svg{width:75%;right:-10%;top:0}
}

/* ── 超小螢幕 375px ── */
@media(max-width:390px){
  .c-en{font-size:clamp(28px,9.5vw,44px)}
  .c-zh{font-size:11px;letter-spacing:0.14em}
  .c-brand-name{font-size:8px;letter-spacing:0.35em}
  .bn-label{font-size:11px;letter-spacing:0.04em}
  .bg-icon{width:min(220px,72vw)}
}

/* ── 減少動畫（無障礙） ── */
@media(prefers-reduced-motion:reduce){
  .bg-layer1,.bg-layer2,.bg-layer3,
  .bg-vignette,.leaves svg,.bg-icon{
    animation:none !important;
  }
}
</style>
</head>
